name: Publish scoreboard data

on:
  repository_dispatch:
    types: [scoreboard-update]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Write data.json
        uses: actions/github-script@v7
        with:
          script: |
            const state = context.payload.client_payload?.state;
            if (!state || !Array.isArray(state.players) || !Array.isArray(state.rounds)) {
              core.setFailed("Missing or invalid scoreboard state.");
              return;
            }

            let sha;
            let existingData = {};
            try {
              const existing = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: "data.json",
                ref: "main"
              });
              sha = existing.data.sha;
              existingData = JSON.parse(Buffer.from(existing.data.content, "base64").toString("utf8"));
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            function preserveFinalScores(incomingMatches, existingMatches) {
              const existingById = new Map((Array.isArray(existingMatches) ? existingMatches : []).map((match) => [match.id, match]));
              return (Array.isArray(incomingMatches) ? incomingMatches : []).map((match) => {
                const existing = existingById.get(match.id);
                if (match.score === "Upcoming" && existing?.score && existing.score !== "Upcoming") {
                  return { ...match, score: existing.score };
                }
                return match;
              });
            }

            const nextRounds = state.rounds.map((round) => {
              const existingRound = (existingData.rounds || []).find((entry) => entry.name === round.name);
              if (!existingRound) return round;
              return { ...round, done: Math.max(Number(round.done) || 0, Number(existingRound.done) || 0) };
            });

            const content = JSON.stringify({
              players: state.players,
              rounds: nextRounds,
              matches: preserveFinalScores(state.matches, existingData.matches),
              round16Matches: preserveFinalScores(state.round16Matches, existingData.round16Matches),
              quarterFinalMatches: preserveFinalScores(state.quarterFinalMatches, existingData.quarterFinalMatches),
              semiFinalMatches: preserveFinalScores(state.semiFinalMatches || existingData.semiFinalMatches, existingData.semiFinalMatches),
              thirdPlaceMatches: preserveFinalScores(state.thirdPlaceMatches || existingData.thirdPlaceMatches, existingData.thirdPlaceMatches),
              finalMatches: preserveFinalScores(state.finalMatches || existingData.finalMatches, existingData.finalMatches),
              previousRanks: state.previousRanks && typeof state.previousRanks === "object" ? state.previousRanks : {}
            }, null, 2) + "\n";

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: "data.json",
              message: "Update scoreboard data",
              content: Buffer.from(content).toString("base64"),
              sha,
              branch: "main"
            });
