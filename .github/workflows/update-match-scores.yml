name: Update match scores

on:
  repository_dispatch:
    types: [scoreboard-score-update]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Update completed upcoming matches
        uses: actions/github-script@v7
        with:
          script: |
            const existing = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: "data.json",
              ref: "main"
            });

            const data = JSON.parse(Buffer.from(existing.data.content, "base64").toString("utf8"));
            const matches = [
              ...(Array.isArray(data.finalMatches) ? data.finalMatches : []),
              ...(Array.isArray(data.thirdPlaceMatches) ? data.thirdPlaceMatches : []),
              ...(Array.isArray(data.semiFinalMatches) ? data.semiFinalMatches : []),
              ...(Array.isArray(data.quarterFinalMatches) ? data.quarterFinalMatches : []),
              ...(Array.isArray(data.round16Matches) ? data.round16Matches : []),
              ...(Array.isArray(data.matches) ? data.matches : [])
            ];
            const upcomingMatches = matches.filter((match) => {
              return match.score === "Upcoming" && match.espnEventId;
            });

            if (!upcomingMatches.length) {
              core.info("No upcoming matches with ESPN ids found.");
              return;
            }

            function scoreSuffix(statusDetail) {
              const detail = String(statusDetail || "").toLowerCase();
              if (detail.includes("pen")) return "pens";
              if (detail.includes("aet") || detail.includes("extra")) return "ET";
              return "RT";
            }

            function formatScore(match, competition) {
              const competitors = competition.competitors || [];
              const home = competitors.find((entry) => entry.homeAway === "home");
              const away = competitors.find((entry) => entry.homeAway === "away");
              if (!home || !away || home.score === undefined || away.score === undefined) return "";

              const [firstTeam, secondTeam] = match.label.split(" v ").map((name) => name.trim());
              const first = [home, away].find((entry) => entry.team?.displayName === firstTeam) || home;
              const second = first === home ? away : home;
              const suffix = scoreSuffix(competition.status?.type?.detail || competition.status?.type?.shortDetail);
              return `${first.team.displayName} ${first.score}-${second.score}, ${suffix}`;
            }

            let changed = false;
            for (const match of upcomingMatches) {
              const response = await fetch(
                `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/summary?event=${encodeURIComponent(match.espnEventId)}`,
                { headers: { "Accept": "application/json" } }
              );

              if (!response.ok) {
                core.warning(`${match.label}: ESPN returned ${response.status}.`);
                continue;
              }

              const summary = await response.json();
              const competition = summary.header?.competitions?.[0];
              if (!competition?.status?.type?.completed) {
                core.info(`${match.label}: not completed yet.`);
                continue;
              }

              const nextScore = formatScore(match, competition);
              if (!nextScore) {
                core.warning(`${match.label}: could not read final score.`);
                continue;
              }

              core.info(`${match.label}: ${match.score} -> ${nextScore}`);
              match.score = nextScore;
              changed = true;
            }

            if (!changed) {
              core.info("No completed scores to update.");
              return;
            }

            const roundOf32 = data.rounds?.find((round) => round.name === "Round of 32");
            if (roundOf32) {
              roundOf32.done = (Array.isArray(data.matches) ? data.matches : []).filter((match) => match.score && match.score !== "Upcoming").length;
            }

            const roundOf16 = data.rounds?.find((round) => round.name === "Round of 16");
            if (roundOf16) {
              roundOf16.done = (Array.isArray(data.round16Matches) ? data.round16Matches : []).filter((match) => match.score && match.score !== "Upcoming").length;
            }

            const quarterFinals = data.rounds?.find((round) => round.name === "Quarter finals");
            if (quarterFinals) {
              quarterFinals.done = (Array.isArray(data.quarterFinalMatches) ? data.quarterFinalMatches : []).filter((match) => match.score && match.score !== "Upcoming").length;
            }

            const semiFinals = data.rounds?.find((round) => round.name === "Semi finals");
            if (semiFinals) {
              semiFinals.done = (Array.isArray(data.semiFinalMatches) ? data.semiFinalMatches : []).filter((match) => match.score && match.score !== "Upcoming").length;
            }

            const thirdPlace = data.rounds?.find((round) => round.name === "3rd place play off");
            if (thirdPlace) {
              thirdPlace.done = (Array.isArray(data.thirdPlaceMatches) ? data.thirdPlaceMatches : []).filter((match) => match.score && match.score !== "Upcoming").length;
            }

            const finals = data.rounds?.find((round) => round.name === "Finals");
            if (finals) {
              finals.done = (Array.isArray(data.finalMatches) ? data.finalMatches : []).filter((match) => match.score && match.score !== "Upcoming").length;
            }

            const content = JSON.stringify(data, null, 2) + "\n";
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: "data.json",
              message: "Update match scores",
              content: Buffer.from(content).toString("base64"),
              sha: existing.data.sha,
              branch: "main"
            });
