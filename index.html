<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>World Cup Shalmoni Scoreboard</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #000;
      --ink: #fff;
      --muted: #fff;
      --dim: #777;
      --line: #fff;
      --card: #000;
      --accent: #fff;
      --star: #39ff14;
      --yellow: #ffe84a;
      --red: #ff3b30;
      --shadow: 8px 8px 0 #fff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      background: var(--bg);
      color: var(--ink);
    }

    main {
      width: min(100%, 720px);
      margin: 0 auto;
      padding: 18px 14px 36px;
    }

    .topline {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      min-height: 44px;
    }

    .view-button {
      min-height: 42px;
      padding: 0 12px;
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: none;
      font-size: .88rem;
    }

    .key-button {
      display: grid;
      place-items: center;
      width: 42px;
      min-height: 42px;
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: none;
      font-size: 1.15rem;
    }

    header {
      padding: 2px 2px 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.9rem, 11vw, 4rem);
      line-height: .96;
      letter-spacing: 0;
      color: var(--accent);
      text-transform: uppercase;
    }

    .title-player-letter {
      color: var(--letter-color, var(--accent));
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 1rem;
      text-transform: uppercase;
    }

    .rounds {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 4px;
      margin: 18px 0 0;
      padding: 0;
      list-style: none;
      text-transform: uppercase;
      font-size: clamp(.5rem, 1.9vw, .72rem);
      font-weight: 850;
    }

    .round {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
      min-width: 0;
      min-height: 46px;
      padding: 5px 3px;
      border: 1px solid var(--dim);
      background: #000;
      color: var(--dim);
      text-align: center;
      line-height: 1.05;
      overflow-wrap: anywhere;
    }

    .round.current {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 2px 2px 0 var(--accent);
    }

    .round-count {
      font-size: 1.15em;
      color: inherit;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 10px 0 14px;
      background: var(--bg);
    }

    .toolbar.viewer {
      display: none;
    }

    .admin-only {
      display: none;
    }

    body[data-admin="true"] .admin-only {
      display: inline-block;
    }

    body[data-admin="true"] .toolbar.admin-only {
      display: grid;
    }

    button {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 0;
      background: var(--card);
      color: var(--ink);
      font: inherit;
      font-weight: 750;
      cursor: pointer;
      box-shadow: 3px 3px 0 var(--accent);
      text-transform: uppercase;
    }

    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #000;
    }

    body:not([data-admin="true"]) .toolbar .primary {
      background: #000;
      color: var(--accent);
    }

    button.icon {
      width: 48px;
      flex: 0 0 48px;
      font-size: 1.25rem;
    }

    button.link-button {
      width: auto;
      padding: 0 12px;
      font-size: .88rem;
    }

    .scoreboard {
      display: grid;
      gap: 10px;
    }

    .view[hidden] {
      display: none;
    }

    .match-table-wrap {
      overflow-x: auto;
      max-width: 100%;
      padding-bottom: 10px;
      scrollbar-width: thin;
    }

    .match-table {
      display: grid;
      grid-template-columns: 112px repeat(8, 34px);
      gap: 3px;
      min-width: 408px;
      text-transform: uppercase;
    }

    .match-head,
    .match-game,
    .match-cell {
      border: 1px solid var(--line);
      background: #000;
    }

    .match-head {
      display: grid;
      place-items: center;
      min-height: 38px;
      padding: 3px;
      color: var(--dim);
      font-size: .52rem;
      font-weight: 850;
      text-align: center;
      line-height: 1;
      overflow-wrap: anywhere;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    .match-game {
      display: grid;
      gap: 3px;
      min-height: 42px;
      padding: 5px 6px;
      position: sticky;
      left: 0;
      z-index: 1;
    }

    .match-title {
      color: var(--ink);
      font-size: .62rem;
      font-weight: 900;
      line-height: 1.05;
    }

    .match-score {
      color: var(--accent);
      font-size: .54rem;
      font-weight: 850;
      line-height: 1.05;
    }

    .match-cell {
      display: grid;
      place-items: center;
      min-height: 42px;
      color: var(--dim);
      font-size: 1rem;
      font-weight: 950;
      box-shadow: none;
    }

    .match-table .match-head:first-child {
      left: 0;
      z-index: 3;
    }

    .match-head.player-head {
      font-size: .78rem;
    }

    .outcome-perfect,
    .match-cell.perfect {
      color: var(--star);
      border-color: var(--line);
    }

    .outcome-correct,
    .match-cell.correct {
      color: var(--yellow);
      border-color: var(--yellow);
    }

    .outcome-wrong,
    .match-cell.wrong {
      color: var(--red);
      border-color: var(--red);
    }

    body[data-admin="true"] .match-cell {
      cursor: pointer;
    }

    .player {
      display: grid;
      grid-template-columns: 46px 1fr auto;
      gap: 10px;
      align-items: center;
      min-height: 74px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 0;
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .player.top-two,
    .player.top-three {
      border-color: var(--accent);
    }

    .player.top-two {
      box-shadow: 5px 5px 0 var(--accent);
    }

    .player.top-three {
      box-shadow: 3px 3px 0 var(--accent);
    }

    .rank {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border: 1px solid var(--player-color, var(--accent));
      border-radius: 0;
      background: #000;
      color: var(--player-color, var(--accent));
      font-weight: 900;
    }

    .player:first-child .rank,
    .player.first-place .rank {
      background: var(--player-color, var(--accent));
      color: #000;
    }

    .player.top-two .rank,
    .player.top-three .rank {
      border-width: 2px;
    }

    .player.top-two .rank {
      background: #000;
      color: var(--player-color, var(--accent));
    }

    .name {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      min-width: 0;
      overflow-wrap: anywhere;
      font-size: 1.08rem;
      font-weight: 850;
    }

    .player-name {
      color: var(--player-color, var(--ink));
    }

    .player-emoji {
      color: var(--player-color, var(--ink));
      font-size: 2em;
      line-height: 1;
    }

    .played {
      flex: 0 0 auto;
      color: var(--dim);
      font-size: .72rem;
      font-weight: 850;
    }

    .breakdown {
      display: none;
      gap: 6px;
      grid-column: 2 / 4;
      color: var(--accent);
      font-size: .82rem;
      font-weight: 850;
      text-transform: uppercase;
    }

    .player.open .breakdown {
      display: flex;
    }

    .breakdown span {
      display: grid;
      place-items: center;
      min-width: 40px;
      height: 34px;
      padding: 0 6px;
      border: 1px solid currentColor;
    }

    .breakdown .outcome-perfect {
      border-color: var(--line);
    }

    .score {
      min-width: 72px;
      text-align: right;
      font-size: 1.75rem;
      line-height: 1;
      font-weight: 950;
      font-variant-numeric: tabular-nums;
      color: var(--player-color, var(--ink));
    }

    .points {
      display: block;
      margin-top: 4px;
      color: var(--player-color, var(--muted));
      font-size: .75rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    dialog {
      width: min(calc(100vw - 24px), 620px);
      max-height: min(82vh, 760px);
      border: 1px solid var(--line);
      border-radius: 0;
      padding: 0;
      background: var(--card);
      color: var(--ink);
      box-shadow: var(--shadow);
    }

    dialog::backdrop { background: rgba(0, 0, 0, .82); }

    .editor {
      display: grid;
      gap: 12px;
      padding: 14px;
    }

    .editor h2 {
      margin: 0;
      font-size: 1.25rem;
      color: var(--accent);
      text-transform: uppercase;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--line);
      box-shadow: 3px 3px 0 var(--accent);
    }

    .score-editor-labels {
      display: none;
    }

    .player-edit-head {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 38px;
      gap: 8px;
    }

    .field {
      display: grid;
      grid-template-columns: 76px minmax(0, 1fr);
      align-items: center;
      gap: 4px;
      min-width: 0;
      color: var(--dim);
      font-size: .72rem;
      font-weight: 850;
      text-align: left;
      text-transform: uppercase;
    }

    .stepper {
      display: grid;
      grid-template-columns: 48px minmax(54px, 1fr) 48px;
      gap: 4px;
    }

    .stepper button {
      min-height: 62px;
      box-shadow: none;
      font-size: 1.25rem;
      line-height: 1;
    }

    .field input {
      min-height: 62px;
      padding: 10px 4px;
      text-align: center;
      font-size: 1.35rem;
      font-weight: 950;
    }

    .row .icon {
      width: 38px;
      min-width: 0;
      min-height: 44px;
      font-size: 1rem;
    }

    input {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 0;
      padding: 10px 12px;
      background: #000;
      color: var(--ink);
      font: inherit;
    }

    .password-error {
      min-height: 1.2em;
      margin: 0;
      color: var(--accent);
      font-size: .82rem;
      text-transform: uppercase;
    }

    .round-editor-rows {
      display: grid;
      gap: 8px;
    }

    .round-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 58px 58px 44px;
      gap: 8px;
      align-items: center;
    }

    .round-row button[aria-pressed="true"] {
      background: var(--accent);
      color: #000;
    }

    input[type="number"] {
      text-align: center;
      font-weight: 850;
    }

    .dialog-actions {
      display: flex;
      gap: 8px;
      position: sticky;
      bottom: 0;
      padding-top: 8px;
      border-top: 1px solid var(--accent);
      background: var(--card);
    }

    .hint {
      margin: 12px 2px 0;
      color: var(--muted);
      font-size: .86rem;
    }

    .toast {
      position: fixed;
      left: 14px;
      right: 14px;
      bottom: 18px;
      z-index: 10;
      display: none;
      max-width: 680px;
      margin: 0 auto;
      padding: 12px 14px;
      border: 1px solid var(--line);
      background: #000;
      color: var(--ink);
      box-shadow: 5px 5px 0 var(--accent);
      font-size: .88rem;
      font-weight: 850;
      text-transform: uppercase;
    }

    .toast.show {
      display: block;
    }

    @media (min-width: 640px) {
      main { padding-top: 28px; }
      .player { grid-template-columns: 56px 1fr auto; padding: 16px; }
      .rank { width: 48px; height: 48px; }
      .score { font-size: 2rem; }
    }
  </style>
</head>

    <div class="topline">

    <header>
      <h1 id="mainTitle">World Cup Shalmoni Scoreboard</h1>
      <p class="subtitle">Live standings for the Shalmoni World Cup 2026 prediction game.</p>
      <ol class="rounds" id="rounds" aria-label="Tournament rounds"></ol>

    <section class="toolbar admin-only" aria-label="Scoreboard controls">
      <button class="primary admin-only" id="editButton" type="button">Edit table</button>
      <button class="primary admin-only" id="roundsButton" type="button">Edit rounds</button>
      <button class="link-button admin-only" id="publishAdminButton" type="button">Publish</button>
      <button class="link-button admin-only" id="exitAdminButton" type="button">Exit admin</button>
    </section>

    <section class="view" id="scoreboardView">

    <section class="view" id="tableView" hidden>
      <div class="match-table-wrap">

      </div>
    </section>
    <p class="hint" id="hint"></p>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </main>

  <dialog id="editorDialog">
    <form class="editor" method="dialog">
      <h2>Edit scores</h2>
      <div id="editorRows"></div>
      <button id="addButton" type="button">Add person</button>
      <div class="dialog-actions">
        <button class="primary" id="saveButton" type="button">Save</button>
        <button id="cancelButton" type="button">Cancel</button>
      </div>
    </form>
  </dialog>

  <dialog id="passwordDialog">
    <form class="editor" method="dialog">
      <h2>Admin access</h2>
      <input id="passwordInput" type="password" autocomplete="current-password" placeholder="Password" aria-label="Admin password">
      <p class="password-error" id="passwordError"></p>
      <div class="dialog-actions">
        <button class="primary" id="unlockButton" type="button">Unlock</button>
        <button id="passwordCancelButton" type="button">Cancel</button>
      </div>
    </form>
  </dialog>

  <dialog id="roundsDialog">
    <form class="editor" method="dialog">
      <h2>Edit rounds</h2>
      <div class="round-editor-rows" id="roundEditorRows"></div>
      <div class="dialog-actions">
        <button class="primary" id="saveRoundsButton" type="button">Save</button>
        <button id="cancelRoundsButton" type="button">Cancel</button>
      </div>
    </form>
  </dialog>

  <dialog id="publishDialog">
    <form class="editor" method="dialog">
      <h2>Publish to GitHub</h2>
      <input id="githubTokenInput" type="password" autocomplete="off" placeholder="GitHub token" aria-label="GitHub token">
      <p class="password-error" id="publishError">Token stays in this browser session.</p>
      <div class="dialog-actions">
        <button class="primary" id="publishButton" type="button">Publish</button>
        <button id="publishCancelButton" type="button">Cancel</button>
      </div>
    </form>
  </dialog>

    function loadState() {
      const fromStateUrl = params.get("state");
      if (fromStateUrl) {
        try {
          const parsed = JSON.parse(atob(decodeURIComponent(fromStateUrl)));
          return normalizeState(parsed);
        } catch {
          return defaultState();
        }
      }
      const fromScoresUrl = params.get("scores");
      if (fromScoresUrl) {
        try {
          return normalizeState({ players: JSON.parse(atob(decodeURIComponent(fromScoresUrl))) });
        } catch {
          return defaultState();
        }
      }
      return defaultState();
    }

    async function loadPublishedState() {
      if (params.has("state")) return;
      try {
        const response = await fetch(`data.json?cache=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) return;
        const publishedState = normalizeState(await response.json());
        players = publishedState.players;
        rounds = publishedState.rounds;
        matches = publishedState.matches;
        persistState();
        render();
      } catch {
        // Keep the bundled starter state if the published JSON cannot be fetched.
      }
    }

    function defaultState() {
      return {
        players: structuredClone(starterPlayers),
        rounds: structuredClone(starterRounds),
        matches: structuredClone(starterMatches)
      };
    }

    function normalizeState(nextState) {
      return {
        players: Array.isArray(nextState.players)
          ? nextState.players.map(normalizePlayer)
          : structuredClone(starterPlayers),
        rounds: Array.isArray(nextState.rounds) ? nextState.rounds : structuredClone(starterRounds),
        matches: Array.isArray(nextState.matches) ? nextState.matches.map(normalizeMatch) : structuredClone(starterMatches)
      };
    }

    function normalizeMatch(match) {
      return {
        id: match.id || crypto.randomUUID(),
        label: match.label || "Match",
        score: match.score || "",
        outcomes: { ...(match.outcomes || {}) }
      };
    }

    function normalizePlayer(player) {
      const hasOutcomes = ["stars", "correct", "wrong"].some((key) => player[key] !== undefined);
      const voted = Number(player.voted ?? player.played) || 0;
      const stars = Number(player.stars) || 0;
      const correct = Number(player.correct) || 0;
      const wrong = player.wrong === undefined
        ? Math.max(voted - stars - correct, 0)
        : Number(player.wrong) || 0;
      return {
        name: player.name || "Unnamed",
        stars,
        correct,
        wrong,
        legacyPoints: hasOutcomes ? null : Number(player.points) || 0
      };
    }

    function persistState() {
      state = serializableState();
      localStorage.setItem("shalmoni-scoreboard-state", JSON.stringify(state));
    }

    function syncUrlToState() {
      history.replaceState(null, "", location.pathname);
    }

    function flashHint(message) {
      hint.textContent = message;
      window.clearTimeout(flashHint.timeout);
      flashHint.timeout = window.setTimeout(() => {
        hint.textContent = isAdmin ? "ADMIN MODE: edit scores or rounds, then exit admin to publish." : "";
      }, 1800);
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timeout);
      showToast.timeout = window.setTimeout(() => {
        toast.classList.remove("show");
      }, 3200);
    }

    function sortedPlayers() {
      return [...players].sort((a, b) => calculatePoints(b) - calculatePoints(a) || a.name.localeCompare(b.name));
    }

    function calculatePoints(player) {
      if (player.legacyPoints !== null && player.legacyPoints !== undefined) {
        return Number(player.legacyPoints) || 0;
      }
      return (Number(player.stars) || 0) * 5 + (Number(player.correct) || 0) * 3 + (Number(player.wrong) || 0);
    }

    function serializableState() {
      return {
        players: players.map((player) => ({
          name: player.name || "Unnamed",
          stars: Number(player.stars) || 0,
          correct: Number(player.correct) || 0,
          wrong: Number(player.wrong) || 0
        })),
        rounds,
        matches
      };
    }

    function render() {
      renderTitle();
      renderRounds();
      renderMatchTable();
      scoreboard.innerHTML = "";
      let previousPoints = null;
      let currentRank = 0;
      sortedPlayers().forEach((player, index) => {
        const points = calculatePoints(player);
        if (points !== previousPoints) currentRank += 1;
        const rank = currentRank;
        previousPoints = points;
        const item = document.createElement("article");
        const profile = playerProfiles[player.name] || { color: "var(--ink)", emoji: "" };
        item.className = `player${rank === 1 ? " first-place" : ""}${rank === 2 ? " top-two" : ""}${rank === 3 ? " top-three" : ""}`;
        item.style.setProperty("--player-color", profile.color);
        item.innerHTML = `
          <div class="rank">${rank}</div>
          <div class="name">
            <span class="player-name"></span>
          </div>
          <div class="score">${points}<span class="points">points</span></div>
          <div class="breakdown">
            <span class="outcome-perfect">★ ${Number(player.stars) || 0}</span>
            <span class="outcome-correct">✓ ${Number(player.correct) || 0}</span>
            <span class="outcome-wrong">× ${Number(player.wrong) || 0}</span>
          </div>
        `;
        item.querySelector(".player-name").innerHTML = "";
        item.querySelector(".player-name").append(document.createTextNode(player.name || "Unnamed"));
        if (profile.emoji) {
          const emoji = document.createElement("span");
          emoji.className = "player-emoji";
          emoji.textContent = profile.emoji;
          item.querySelector(".player-name").append(" ", emoji);
        }
        item.addEventListener("click", () => item.classList.toggle("open"));
        item.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            item.classList.toggle("open");
          }
        });
        item.tabIndex = 0;
        scoreboard.appendChild(item);
      });
    }

    function renderTitle() {
      const letters = "Shalmoni".split("");
      const orderedPlayers = sortedPlayers();
      mainTitle.textContent = "";
      mainTitle.append(document.createTextNode("World Cup "));
      letters.forEach((letter, index) => {
        const player = orderedPlayers[index];
        const profile = playerProfiles[player?.name] || {};
        const span = document.createElement("span");
        span.className = "title-player-letter";
        span.style.setProperty("--letter-color", profile.color || "var(--accent)");
        span.textContent = letter;
        mainTitle.append(span);
      });
      mainTitle.append(document.createTextNode(" Scoreboard"));
    }

    function renderMatchTable() {
      matchTable.innerHTML = "";
      addMatchNode("match-head", "Game");
      playerNames.forEach((name) => addMatchNode("match-head player-head", playerProfiles[name]?.emoji || playerLabels[name] || name));
      matches.forEach((match, matchIndex) => {
        const game = document.createElement("div");
        game.className = "match-game";
        game.innerHTML = `<span class="match-title"></span><span class="match-score"></span>`;
        game.querySelector(".match-title").textContent = match.label;
        game.querySelector(".match-score").textContent = match.score;
        matchTable.appendChild(game);

        playerNames.forEach((playerName) => {
          const outcome = match.outcomes[playerName] || "";
          const cell = document.createElement("button");
          cell.type = "button";
          cell.className = `match-cell ${outcome}`;
          cell.textContent = outcomeSymbol(outcome);
          cell.title = `${playerName}: ${match.label}`;
          cell.setAttribute("aria-label", `${playerName}, ${match.label}, ${outcome || "not played"}`);
          cell.addEventListener("click", () => {
            if (isAdmin) {
              const next = nextOutcome(outcome);
              match.outcomes[playerName] = next;
              applyOutcomeDelta(playerName, outcome, next);
              persistState();
              render();
              return;
            }
            const message = `${playerName} / ${match.label}: ${outcomeLabel(outcome)} (${outcomePoints(outcome)} pts). Final: ${match.score}`;
            flashHint(message);
            showToast(message);
          });
          matchTable.appendChild(cell);
        });
      });
    }

    function addMatchNode(className, text) {
      const node = document.createElement("div");
      node.className = className;
      node.textContent = text;
      matchTable.appendChild(node);
    }

    function outcomeSymbol(outcome) {
      return { perfect: "★", correct: "✓", wrong: "×" }[outcome] || "";
    }

    function outcomeLabel(outcome) {
      return { perfect: "Perfect", correct: "Correct", wrong: "Wrong" }[outcome] || "No pick";
    }

    function outcomePoints(outcome) {
      return { perfect: 5, correct: 3, wrong: 1 }[outcome] || 0;
    }

    function nextOutcome(outcome) {
      return { "": "perfect", perfect: "correct", correct: "wrong", wrong: "" }[outcome || ""];
    }

    function applyOutcomeDelta(playerName, previousOutcome, nextOutcomeValue) {
      let player = players.find((entry) => entry.name === playerName);
      if (!player) {
        player = { name: playerName, stars: 0, correct: 0, wrong: 0 };
        players.push(player);
      }
      updateOutcomeCount(player, previousOutcome, -1);
      updateOutcomeCount(player, nextOutcomeValue, 1);
    }

    function updateOutcomeCount(player, outcome, delta) {
      const key = { perfect: "stars", correct: "correct", wrong: "wrong" }[outcome];
      if (!key) return;
      player[key] = Math.max(0, (Number(player[key]) || 0) + delta);
    }

    function recalculatePlayersFromMatches() {
      players = playerNames.map((name) => {
        const totals = { name, stars: 0, correct: 0, wrong: 0 };
        matches.forEach((match) => {
          const outcome = match.outcomes[name];
          if (outcome === "perfect") totals.stars += 1;
          if (outcome === "correct") totals.correct += 1;
          if (outcome === "wrong") totals.wrong += 1;
        });
        return totals;
      });
    }

    function switchView(nextView) {
      activeView = nextView;
      scoreboardView.hidden = activeView !== "scoreboard";
      tableView.hidden = activeView !== "table";
      viewToggleButton.textContent = activeView === "scoreboard" ? "Table" : "Scores";
    }

    function renderRounds() {
      roundsList.innerHTML = "";
      rounds.forEach((round) => {
        const item = document.createElement("li");
        item.className = `round${round.current ? " current" : ""}`;
        item.innerHTML = `
          <span></span>
          <span class="round-count">${Number(round.done) || 0}/${Number(round.total) || 0}</span>
        `;
        item.querySelector("span").textContent = round.name || "Round";
        roundsList.appendChild(item);
      });
    }

    function renderEditor() {
      editorRows.innerHTML = "";
      const labels = document.createElement("div");
      labels.className = "score-editor-labels";
      labels.innerHTML = "<span>Name</span><span>Star</span><span>Correct</span><span>Wrong</span><span></span>";
      editorRows.appendChild(labels);
      players.forEach((player, index) => addEditorRow(player, index));
    }

    function addEditorRow(player = { name: "", stars: 0, correct: 0, wrong: 0 }, index = editorRows.children.length) {
      const row = document.createElement("div");
      row.className = "row";
      row.innerHTML = `
        <div class="player-edit-head">
          <input aria-label="Name" value="">
          <button class="icon" type="button" aria-label="Remove person">×</button>
        </div>
        <label class="field">Star<span class="stepper"><button type="button" data-step="-1" aria-label="Decrease stars">-</button><input aria-label="Stars" type="number" inputmode="numeric" min="0" value="${Number(player.stars) || 0}" readonly><button type="button" data-step="1" aria-label="Increase stars">+</button></span></label>
        <label class="field">Correct<span class="stepper"><button type="button" data-step="-1" aria-label="Decrease correct">-</button><input aria-label="Correct" type="number" inputmode="numeric" min="0" value="${Number(player.correct) || 0}" readonly><button type="button" data-step="1" aria-label="Increase correct">+</button></span></label>
        <label class="field">Wrong<span class="stepper"><button type="button" data-step="-1" aria-label="Decrease wrong">-</button><input aria-label="Wrong" type="number" inputmode="numeric" min="0" value="${Number(player.wrong) || 0}" readonly><button type="button" data-step="1" aria-label="Increase wrong">+</button></span></label>
      `;
      row.querySelector("input").value = player.name || "";
      row.querySelector("button").addEventListener("click", () => {
        row.remove();
        if (!editorRows.children.length) addEditorRow();
      });
      row.querySelectorAll(".stepper button").forEach((button) => {
        button.addEventListener("click", () => {
          const input = button.parentElement.querySelector("input");
          const nextValue = Math.max(0, (Number(input.value) || 0) + Number(button.dataset.step));
          input.value = nextValue;
        });
      });
      editorRows.appendChild(row);
    }

    function saveFromEditor() {
      players = [...editorRows.querySelectorAll(".row")].map((row) => {
        const inputs = row.querySelectorAll("input");
        return {
          name: inputs[0].value.trim() || "Unnamed",
          stars: Number(inputs[1].value) || 0,
          correct: Number(inputs[2].value) || 0,
          wrong: Number(inputs[3].value) || 0
        };
      });
      persistState();
      syncUrlToState();
      editorDialog.close();
      render();
      flashHint("Scores saved.");
    }

    function renderRoundEditor() {
      roundEditorRows.innerHTML = "";
      rounds.forEach((round, index) => {
        const row = document.createElement("div");
        row.className = "round-row";
        row.innerHTML = `
          <input aria-label="Round name" value="">
          <input aria-label="Games done" type="number" inputmode="numeric" min="0" value="${Number(round.done) || 0}">
          <input aria-label="Games total" type="number" inputmode="numeric" min="0" value="${Number(round.total) || 0}">
          <button type="button" aria-label="Mark current round" aria-pressed="${round.current ? "true" : "false"}">*</button>
        `;
        row.querySelector("input").value = round.name || "";
        row.querySelector("button").addEventListener("click", () => {
          roundEditorRows.querySelectorAll("button").forEach((button) => button.setAttribute("aria-pressed", "false"));
          row.querySelector("button").setAttribute("aria-pressed", "true");
        });
        roundEditorRows.appendChild(row);
      });
    }

    function saveRoundsFromEditor() {
      rounds = [...roundEditorRows.children].map((row) => {
        const inputs = row.querySelectorAll("input");
        return {
          name: inputs[0].value.trim() || "Round",
          done: Number(inputs[1].value) || 0,
          total: Number(inputs[2].value) || 0,
          current: row.querySelector("button").getAttribute("aria-pressed") === "true"
        };
      });
      if (!rounds.some((round) => round.current) && rounds.length) {
        rounds[0].current = true;
      }
      persistState();
      syncUrlToState();
      roundsDialog.close();
      render();
      flashHint("Rounds saved.");
    }

    function encodedState() {
      return encodeURIComponent(btoa(JSON.stringify(serializableState())));
    }

    function makeShareUrl() {
      return `${location.origin}${location.pathname}`;
    }

    function setAdmin(nextAdmin) {
      isAdmin = nextAdmin;
      document.body.dataset.admin = String(isAdmin);
      toolbar.classList.toggle("viewer", !isAdmin);
      sessionStorage.setItem("shalmoni-scoreboard-admin", String(isAdmin));
      hint.textContent = isAdmin
        ? "ADMIN MODE: edit scores or rounds, then exit admin to publish."
        : "";
    }

    async function hashPassword(password) {
      const bytes = new TextEncoder().encode(password);
      const hashBuffer = await crypto.subtle.digest("SHA-256", bytes);
      return [...new Uint8Array(hashBuffer)].map((byte) => byte.toString(16).padStart(2, "0")).join("");
    }

    async function publishToGitHub(token) {
      publishError.textContent = "Publishing...";
      const response = await fetch(githubDispatchUrl, {
        method: "POST",
        headers: {
          "Accept": "application/vnd.github+json",
          "Authorization": `Bearer ${token}`,
          "Content-Type": "application/json",
          "X-GitHub-Api-Version": "2022-11-28"
        },
        body: JSON.stringify({
          event_type: "scoreboard-update",
          client_payload: {
            state: serializableState()
          }
        })
      });

      if (!response.ok) {
        const message = await response.text();
        throw new Error(message || `GitHub returned ${response.status}`);
      }
    }

    async function exitAdminAndPublish() {
      persistState();
      syncUrlToState();
      const token = sessionStorage.getItem("shalmoni-github-token");
      if (!token) {
        githubTokenInput.value = "";
        publishError.textContent = "Enter a GitHub token to publish these scores.";
        publishDialog.showModal();
        githubTokenInput.focus();
        return;
      }
      try {
        flashHint("Publishing to GitHub...");
        await publishToGitHub(token);
        setAdmin(false);
        hint.textContent = "Published.";
      } catch (error) {
        sessionStorage.removeItem("shalmoni-github-token");
        publishError.textContent = "Publish failed. Enter token again.";
        publishDialog.showModal();
      }
    }

    document.querySelector("#keyButton").addEventListener("click", () => {
      if (isAdmin) return;
      passwordInput.value = "";
      passwordError.textContent = "";
      passwordDialog.showModal();
      passwordInput.focus();
    });

    document.querySelector("#unlockButton").addEventListener("click", async () => {
      const enteredHash = await hashPassword(passwordInput.value);
      if (enteredHash !== adminPasswordHash) {
        passwordError.textContent = "Wrong password.";
        passwordInput.select();
        return;
      }
      setAdmin(true);
      passwordDialog.close();
    });

    passwordInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        document.querySelector("#unlockButton").click();
      }
    });

    document.querySelector("#passwordCancelButton").addEventListener("click", () => passwordDialog.close());

    viewToggleButton.addEventListener("click", () => {
      switchView(activeView === "scoreboard" ? "table" : "scoreboard");
    });

    document.querySelector("#editButton").addEventListener("click", () => {
      switchView("table");
      flashHint("ADMIN TABLE MODE: tap cells to cycle star, check, X, blank.");
    });

    document.querySelector("#roundsButton").addEventListener("click", () => {
      renderRoundEditor();
      roundsDialog.showModal();
    });

    document.querySelector("#exitAdminButton").addEventListener("click", () => {
      setAdmin(false);
    });

    document.querySelector("#publishAdminButton").addEventListener("click", () => {
      exitAdminAndPublish();
    });

    document.querySelector("#addButton").addEventListener("click", () => addEditorRow());
    document.querySelector("#saveButton").addEventListener("click", saveFromEditor);
    document.querySelector("#cancelButton").addEventListener("click", () => editorDialog.close());
    document.querySelector("#saveRoundsButton").addEventListener("click", saveRoundsFromEditor);
    document.querySelector("#cancelRoundsButton").addEventListener("click", () => roundsDialog.close());

    document.querySelector("#publishButton").addEventListener("click", async () => {
      const token = githubTokenInput.value.trim();
      if (!token) {
        publishError.textContent = "Token required.";
        return;
      }
      try {
        sessionStorage.setItem("shalmoni-github-token", token);
        await publishToGitHub(token);
        publishDialog.close();
        setAdmin(false);
        hint.textContent = "Published.";
      } catch (error) {
        sessionStorage.removeItem("shalmoni-github-token");
        publishError.textContent = "Publish failed. Check token permissions.";
      }
    });

    document.querySelector("#publishCancelButton").addEventListener("click", () => publishDialog.close());

    render();
  </script>
</body>
</html>
